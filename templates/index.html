<!DOCTYPE html>
<html>
<head>
    <title>Women Safety Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>

    <nav>
        <div class="container nav-inner">
            <a class="brand" href="/home">SheSecure</a>
            <div class="nav-links">
                     <a href="/home">Home</a>
                     <a href="/location">Location</a>
                     <a href="/helpline">Helplines</a>
                    <!-- All-in-one removed -->
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="form-wrapper">
            <h1>📊 Safety Risk Assessment Result</h1>
            <form action="/predict" method="POST">
                <label>Crime Count</label>
                <input type="number" name="crime" placeholder="Crime Count" required>

                <label>Hour (0–23)</label>
                <input type="number" name="hour" placeholder="Hour (0–23)" required>

                <label>Crowd Density (0–1)</label>
                <input type="number" step="0.1" name="crowd" placeholder="Crowd Density (0–1)" required>

                <label>Weather</label>
                <select name="weather" required>
                    <option value="0">Clear</option>
                    <option value="1">Rainy</option>
                </select>

                <button type="submit">Check Risk</button>
            </form>

            {% if result %}
            <div style="margin-top:16px;">
                <h2>Result: {{ result }}</h2>
            </div>
            {% endif %}

            <div style="margin-top:12px;text-align:center"><a href="/">Back to Home</a></div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">© 2026 SheSecure</div>
    </footer>

    <button id="sos-btn" class="sos-btn" title="SOS">SOS</button>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
