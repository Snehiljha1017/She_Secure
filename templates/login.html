{% extends "base.html" %}

{% block title %}Login - SheSecure{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your SheSecure account</p>
        </div>

        <form class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/signup">Create one now</a></p>
        </div>
    </div>
</div>

<style>
.auth-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 200px);
    padding: 40px 20px;
    background-color: var(--bg-primary);
    transition: background-color 0.3s ease;
}

.auth-card {
    width: 100%;
    max-width: 400px;
    background: var(--card-bg);
    color: var(--text-primary);
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 32px var(--card-shadow);
    animation: slideInUp 0.5s ease-out;
    transition: all 0.3s ease;
}

.auth-header {
    text-align: center;
    margin-bottom: 32px;
}

.auth-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    margin: 0 0 8px 0;
}

.auth-header p {
    color: var(--text-secondary);
    margin: 0;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
}

.form-group label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
}

.form-group input {
    padding: 12px;
    background-color: var(--input-bg);
    color: var(--text-primary);
    border: 2px solid var(--input-border);
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.15);
}

body.theme-dark .form-group input:focus {
    box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.2);
}

body.theme-high-contrast .form-group input:focus {
    box-shadow: 0 0 0 3px rgba(255, 255, 0, 0.3);
}

.btn-block {
    width: 100%;
    margin-top: 8px;
}

.auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--text-secondary);
}

.auth-footer a {
    color: var(--accent-2);
    text-decoration: none;
    font-weight: 600;
}

.auth-footer a:hover {
    text-decoration: underline;
}

@media (max-width: 600px) {
    .auth-card {
        padding: 24px;
    }

    .auth-header h1 {
        font-size: 24px;
    }
}
</style>

<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    // Demo login - redirect to dashboard
    localStorage.setItem('user_email', email);
    window.location.href = '/dashboard';
});
</script>
{% endblock %}
