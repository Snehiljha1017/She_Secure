<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SheSecure{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='logos.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='offline-safety.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='sos-button.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='back-button.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar" id="navbar">
        <div class="container nav-inner">
            <a class="brand navbar-logo" href="/">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath d='M24 4L24 4C24 4 10 10 10 24C10 34 16 42 24 44C32 42 38 34 38 24C38 10 24 4 24 4Z' fill='white' stroke='white' stroke-width='2.5' stroke-linejoin='round'/%3E%3Cpath d='M24 10C24 10 16 14.5 16 23C16 29.5 19.5 35 24 37C28.5 35 32 29.5 32 23C32 14.5 24 10 24 10Z' fill='%236366f1' stroke='white' stroke-width='1.5'/%3E%3Cpath d='M18 22L22 26L30 18' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" alt="SheSecure Shield Logo">
                <span class="navbar-logo-text">SheSecure</span>
            </a>
            
            <div class="nav-links" id="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/counselling" class="nav-link">💚 Counselling</a>
                <a href="/login" class="nav-link">Login</a>
                <a href="/signup" class="nav-link">Sign Up</a>
                
                <!-- Theme Selector -->
                <div class="theme-selector" id="theme-selector">
                    <button class="theme-btn" id="theme-btn" title="Switch Theme">🌙</button>
                    <div class="theme-menu" id="theme-menu">
                        <button class="theme-option" data-theme="light" title="Light Theme">☀️ Light</button>
                        <button class="theme-option" data-theme="dark" title="Dark Theme">🌙 Dark</button>
                        <button class="theme-option" data-theme="high-contrast" title="High Contrast">♿ Contrast</button>
                    </div>
                </div>
            </div>

            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="page-container">
        {% block content %}{% endblock %}
    </main>

    <!-- Floating Chatbot Button -->
    <button class="floating-chatbot-btn" id="floating-chatbot-btn" title="Open Chat">
        💬
    </button>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 SheSecure. Your Safety, Our Priority.</p>
            <div class="footer-links">
                <a href="#privacy">Privacy</a>
                <a href="#terms">Terms</a>
                <a href="#contact">Contact</a>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/offline-safety.js') }}"></script>
    <script src="{{ url_for('static', filename='js/sos-button.js') }}"></script>
    <script src="{{ url_for('static', filename='js/back-button.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
