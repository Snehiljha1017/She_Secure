{% extends "base.html" %}

{% block title %}Safety Predictor - SheSecure{% endblock %}

{% block content %}
<div class="container predictor-container">
    <!-- Logo Section -->
    <div style="padding: 24px 0; text-align: center; margin-bottom: 16px;">
        <div class="logo-badge logo-badge-small" style="margin: 0 auto 12px; width: 70px; height: 70px;">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SheSecure Logo" class="shesecure-shield logo-badge-small" style="width: 60px; height: auto; object-fit: contain;">
        </div>
        <h2 style="margin: 0; color: var(--text-primary);">SheSecure</h2>
    </div>

    <div class="predictor-header fade-in">
        <h1>🎯 Safety Predictor</h1>
        <p>Analyze real-time safety risks in your area</p>
    </div>

    <div class="predictor-card fade-in-up">
        <form id="predictor-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="latitude">Latitude</label>
                    <input type="number" id="latitude" name="latitude" step="0.0001" placeholder="28.7041" required>
                </div>
                <div class="form-group">
                    <label for="longitude">Longitude</label>
                    <input type="number" id="longitude" name="longitude" step="0.0001" placeholder="77.1025" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="hour">Hour (0-23)</label>
                    <input type="number" id="hour" name="hour" min="0" max="23" placeholder="14" required>
                </div>
                <div class="form-group">
                    <label for="day">Day of Week (0-6)</label>
                    <input type="number" id="day" name="day" min="0" max="6" placeholder="3" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg">Analyze Safety</button>
        </form>

        <div id="result" class="result-box" style="display: none;">
            <h3>Safety Analysis Result</h3>
            <div class="risk-meter">
                <div class="risk-bar" id="risk-bar"></div>
            </div>
            <p id="result-text"></p>
            <div class="result-tips">
                <h4>Safety Tips:</h4>
                <ul id="tips-list"></ul>
            </div>
        </div>
    </div>
</div>

<style>
.predictor-container {
    padding: 60px 0;
}

.predictor-header {
    text-align: center;
    margin-bottom: 40px;
}

.predictor-header h1 {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    margin: 0 0 12px 0;
}

.predictor-header p {
    font-size: 16px;
    color: var(--text-secondary);
    margin: 0;
    transition: color 0.3s ease;
}

.predictor-card {
    background: var(--card-bg);
    color: var(--text-primary);
    padding: 40px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
    box-shadow: 0 8px 24px var(--card-shadow);
    max-width: 600px;
    margin: 0 auto;
    transition: all 0.3s ease;
}

.form-group label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
    transition: color 0.3s ease;
}

.form-group input {
    padding: 12px;
    background-color: var(--input-bg);
    color: var(--text-primary);
    border: 2px solid var(--input-border);
    border-radius: 8px;
    font-size: 14px;
    transition: all 0.3s ease;
}

.form-group input:focus {
    outline: none;
    border-color: var(--accent-2);
    box-shadow: 0 0 0 3px rgba(255, 64, 129, 0.15);
}

body.theme-dark .form-group input:focus {
    box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.2);
}

body.theme-high-contrast .form-group input:focus {
    box-shadow: 0 0 0 3px rgba(255, 255, 0, 0.3);
}

.result-box {
    margin-top: 40px;
    padding: 24px;
    background-color: var(--bg-secondary);
    color: var(--text-primary);
    border-radius: 8px;
    border-left: 4px solid var(--accent-2);
    transition: all 0.3s ease;
}

.risk-meter {
    width: 100%;
    height: 30px;
    background-color: var(--border-color);
    border-radius: 15px;
    overflow: hidden;
    margin: 16px 0;
    transition: background-color 0.3s ease;
}

#result-text {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    margin: 16px 0;
    transition: color 0.3s ease;
}

.result-tips ul {
    list-style-position: inside;
    color: var(--text-secondary);
    transition: color 0.3s ease;
}

@media (max-width: 768px) {
    .form-row {
        grid-template-columns: 1fr;
    }

    .predictor-card {
        padding: 24px;
    }
}
</style>

<script>
document.getElementById('predictor-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const lat = parseFloat(document.getElementById('latitude').value);
    const lon = parseFloat(document.getElementById('longitude').value);
    const hour = parseInt(document.getElementById('hour').value);
    const day = parseInt(document.getElementById('day').value);
    
    // Mock safety prediction
    const safetyScore = Math.random() * 100;
    const riskLevel = safetyScore > 70 ? 'Safe' : safetyScore > 40 ? 'Moderate Risk' : 'High Risk';
    const riskColor = safetyScore > 70 ? '#4caf50' : safetyScore > 40 ? '#ffc107' : '#f44336';
    
    document.getElementById('risk-bar').style.width = safetyScore + '%';
    document.getElementById('risk-bar').style.background = `linear-gradient(90deg, #4caf50 0%, #ffc107 50%, #f44336 100%)`;
    document.getElementById('result-text').textContent = `Safety Score: ${safetyScore.toFixed(1)}/100 - ${riskLevel}`;
    
    const tips = riskLevel === 'Safe' ? 
        ['Keep your location shared with trusted contacts', 'Maintain regular check-ins'] :
        riskLevel === 'Moderate Risk' ?
        ['Avoid traveling alone', 'Stay alert and aware of surroundings'] :
        ['Consider alternative routes', 'Travel with trusted people', 'Increase security precautions'];
    
    document.getElementById('tips-list').innerHTML = tips.map(tip => `<li>${tip}</li>`).join('');
    document.getElementById('result').style.display = 'block';
});
</script>
{% endblock %}
